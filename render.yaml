services:
  - type: web
    name: dentalbot-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    maxShutdownDelaySeconds: 60
    envVars:
      - key: TelegramBot__Token
        sync: false
      - key: TelegramBot__WebhookUrl
        sync: false
      - key: ConnectionStrings__Default
        fromDatabase:
          name: dentalbot-db
          property: connectionString

databases:
  - name: dentalbot-db
    plan: free
    region: frankfurt
    databaseName: dentalbot
    user: dentalbot
    postgresMajorVersion: "18"
